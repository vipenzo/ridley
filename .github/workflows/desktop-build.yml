name: Desktop Build (macOS)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to build for and upload DMG to (e.g. v1.11.0). Leave blank to use the workflow ref."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install build dependencies
        run: brew install cmake boost eigen libpng

      - name: Clone libfive
        run: |
          git clone --depth 1 https://github.com/libfive/libfive.git \
            desktop/src-tauri/vendor/libfive

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve build tag
        id: tag
        run: |
          TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME:-dev}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build frontend (production JS)
        run: |
          npx shadow-cljs release app \
            --config-merge "{:closure-defines {ridley.version/VERSION \"${{ steps.tag.outputs.value }}\"}}"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: desktop/src-tauri
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Bundle dylibs
        working-directory: desktop
        run: bash bundle-dylibs.sh

      - name: Create DMG
        run: |
          APP_BUNDLE="desktop/src-tauri/target/release/bundle/macos/Ridley.app"
          hdiutil create -volname "Ridley" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            "Ridley-${{ steps.tag.outputs.value }}-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ridley-macOS-dmg
          path: "Ridley-*.dmg"

      - name: Attach DMG to release
        if: startsWith(steps.tag.outputs.value, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.value }}" Ridley-*.dmg --clobber
